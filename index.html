<body>
<div class="app">

<script>
const PN={urgent:'紧急',high:'高',medium:'中',low:'低'};
const TNS=['工作','个人','学习','重要','创意','紧急'];
const TCS=['#ff3b30','#007aff','#34c759','#ff9500','#5856d6','#ff3b30'];
const WDE=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fd(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function tf(d){return S.tasks[d]||[]}
function tt(){let n=0;for(let d in S.tasks)n+=S.tasks[d].length;return n}
function td(){let n=0;for(let d in S.tasks)n+=S.tasks[d].filter(t=>t.dn).length;return n}
function tc(p){const m={urgent:'tg-u',high:'tg-h',medium:'tg-m',low:'tg-l'};return m[p]||'tg-m'}
function dc2(p){const m={urgent:'#f53736',high:'#ff9500',medium:'#007aff',low:'#aeaeb2'};return m[p]||'#007aff'}
const S={tasks:{},tags:[],focus:{m:25,r:1500,run:false,int:null},streak:7,fs:4,ft:135,sel:'2026-06-21',y:2026,m:6};
S.tags=TNS.map((n,i)=>({n,c:TCS[i],cnt:Math.floor(Math.random()*15+3)}));
const seed={'2026-06-21':[{id:'t1',t:'设计评审会议',tm:'14:00',p:'urgent',dn:true,ss:[{t:'准备 PPT',dn:true},{t:'确认参会人员',dn:true}]},{id:'t2',t:'完成需求文档',tm:'10:00',p:'high',dn:true,ss:[]},{id:'t3',t:'周报提交',tm:'18:00',p:'medium',dn:true,ss:[]}],'2026-06-22':[{id:'t4',t:'团队午餐',tm:'12:00',p:'low',dn:false,ss:[]}],'2026-06-24':[{id:'t5',t:'UI 评审',tm:'15:00',p:'medium',dn:false,ss:[]},{id:'t6',t:'版本发布',tm:'17:00',p:'urgent',dn:false,ss:[]}],'2026-06-28':[{id:'t7',t:'周报',tm:'18:00',p:'medium',dn:false,ss:[]}]};
for(let d in seed)S.tasks[d]=seed[d].map(t=>({...t,ss:t.ss.map(s=>({...s}))}));

function bc(){
  const g=document.getElementById('cg'),y=S.y,m=S.m;
  const f=new Date(y,m,1).getDay(),ds=new Date(y,m+1,0).getDate(),pd2=new Date(y,m,0).getDate();
  const ts=fd(new Date().getFullYear(),new Date().getMonth(),new Date().getDate()),sel=S.sel;
  let h='<div class="chr">'+WDE.map(d=>'<div class="chd">'+d+'</div>').join('')+'</div>';
  let cells=[];
  for(let i=f-1;i>=0;i--){const d=pd2-i,date=fd(y,m-1,d),t=tf(date);cells.push(ch(d,true,date==ts,date==sel,t,date));}
  for(let d=1;d<=ds;d++){const date=fd(y,m,d),t=tf(date);cells.push(ch(d,false,date==ts,date==sel,t,date));}
  const rem=7-cells.length%7;
  for(let d=1;d<=(rem<7?rem:0);d++){const date=fd(y,m+1,d),t=tf(date);cells.push(ch(d,true,date==ts,date==sel,t,date));}
  for(let i=0;i<cells.length;i+=7)h+='<div class="cw">'+cells.slice(i,i+7).join('')+'</div>';
  g.innerHTML=h;document.getElementById('cmt').textContent=y+'年'+(m+1)+'月';document.getElementById('ctc').textContent=tt();
  g.querySelectorAll('.dc').forEach(el=>{el.onclick=function(){S.sel=this.dataset.d;bc();ra();};});
}
function ch(day,om,t,s,tasks,date){
  const its=tasks.slice(0,3).map(t=>'<div class="cti"><span class="d" style="background:'+dc2(t.p)+'"></span>'+(t.tm?'<span class="tm">'+esc(t.tm)+'</span>':'')+esc(t.t)+'</div>').join('');
  const c='dc'+(om?' om':'')+(t?' today':'')+(s?' sel':'');
  return '<div class="'+c+'" data-d="'+date+'"><div class="dcirc">'+(day?'<span class="num">'+day+'</span>':'')+'</div><div class="ct">'+its+'</div></div>';
}
function rdt(){
  const d=S.sel,p=d.slice(5,7),dd=d.slice(8,10);
  document.getElementById('dt').innerHTML='<span class="num">'+p+'</span>月<span class="num">'+dd+'</span>日';
  const t=tf(d),dn=t.filter(x=>x.dn).length;
  document.getElementById('dcount').innerHTML='<span class="num">'+dn+'</span>/<span class="num">'+t.length+'</span>';
  const l=document.getElementById('tl');
  if(!t.length)l.innerHTML='<div style="padding:12px 8px;color:var(--ink-tertiary)">暂无任务</div>';
  else{l.innerHTML=t.map(x=>th(x,d)).join('');ae();}
}
function th(t,date){
  let ss='';
  if(t.ss&&t.ss.length){
    ss='<div class="st">'+t.ss.map((s,i)=>'<div class="si"><div class="scb'+(s.dn?' dn':'')+'" data-d="'+date+'" data-t="'+t.id+'" data-s="'+i+'"></div><span class="sit'+(s.dn?' dn':'')+'">'+esc(s.t)+'</span></div>').join('')+'</div>';}
  return '<div class="ti"><div class="tcb'+(t.dn?' dn':'')+'" data-d="'+date+'" data-t="'+t.id+'"></div><div class="tb"><div class="tt'+(t.dn?' dn':'')+'">'+esc(t.t)+'</div><div class="tm">'+(t.tm?'<span class="num">'+esc(t.tm)+'</span>':'')+'<span class="ttg '+tc(t.p)+'">'+PN[t.p]+'</span></div>'+ss+'</div><button class="td" data-d="'+date+'" data-t="'+t.id+'" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>';
}
function ae(){
  document.querySelectorAll('.tcb').forEach(el=>{el.onclick=function(e){e.stopPropagation();
    const d=this.dataset.d,id=this.dataset.t,t=S.tasks[d]?.find(x=>x.id===id);if(!t)return;
    t.dn=!t.dn;this.classList.toggle('dn');
    const tt2=this.closest('.ti').querySelector('.tt');if(tt2)tt2.classList.toggle('dn');ra();};});
  document.querySelectorAll('.scb').forEach(el=>{el.onclick=function(e){e.stopPropagation();
    const d=this.dataset.d,id=this.dataset.t,si=this.dataset.s,t=S.tasks[d]?.find(x=>x.id===id);
    if(!t||!t.ss[si])return;t.ss[si].dn=!t.ss[si].dn;this.classList.toggle('dn');
    const s2=this.closest('.si').querySelector('.sit');if(s2)s2.classList.toggle('dn');ra();};});
  document.querySelectorAll('.td').forEach(el=>{el.onclick=function(e){e.stopPropagation();
    const d=this.dataset.d,id=this.dataset.t;
    if(!confirm('删除？'))return;
    S.tasks[d]=S.tasks[d]?.filter(x=>x.id!==id)||[];if(!S.tasks[d].length)delete S.tasks[d];
    bc();ra();};});
}
function rt(){
  const n=new Date();document.getElementById('tSub').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日';
  const d=fd(n.getFullYear(),n.getMonth(),n.getDate()),t=tf(d),dn=t.filter(x=>x.dn).length,pct=t.length?Math.round(dn/t.length*100):0;
  document.getElementById('tStats').innerHTML='<div class="sc"><div class="sl">今日</div><div class="sv"><span class="nu">'+dn+'</span><span class="u">/'+t.length+'</span></div><div class="sch">'+(pct==100?'完成':pct+'%')+'</div></div><div class="sc"><div class="sl">专注</div><div class="sv"><span class="nu">'+Math.floor(S.ft/60)+'</span><span class="u">h '+S.ft%60+'m</span></div><div class="sch">+25%</div></div><div class="sc"><div class="sl">连续</div><div class="sv"><span class="nu">'+S.streak+'</span><span class="u">天</span></div><div class="sch">最长12天</div></div>';
  const tl=document.getElementById('tTimeline');
  if(!t.length)tl.innerHTML='<div style="padding:12px 0;color:var(--ink-tertiary)">暂无</div>';
  else tl.innerHTML=t.map(x=>'<div class="tli"><div class="tld" style="background:'+(x.dn?'var(--green)':dc2(x.p))+'"></div><div class="tlb">'+(x.tm?'<div class="tltm"><span class="num">'+esc(x.tm)+'</span></div>':'')+'<div class="tltt">'+esc(x.t)+'</div></div></div>').join('');
}
function rs2(){
  const t=tt(),dn=td(),pct=t?Math.round(dn/t*100):0;
  const wd=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('mStats').innerHTML='<div class="sc"><div class="sl">Today</div><div class="sv"><span class="nu">'+dn+'</span><span class="u">/'+t+'</span></div><div class="sch">'+pct+'%</div></div><div class="sc"><div class="sl">Week</div><div class="sv"><span class="nu">'+t+'</span><span class="u">项</span></div><div class="sch">+3</div></div><div class="sc"><div class="sl">Month</div><div class="sv"><span class="nu">'+t+'</span><span class="u">项</span></div><div class="sch">+12%</div></div>';
  document.getElementById('wTrend').innerHTML=wd.map((d,i)=>{const p=[85,92,78,100,60,95,100][i];return '<div class="clr"><span class="dl">'+d+'</span><div class="bt"><div class="bf" style="width:'+p+'%"></div></div><span class="bp2"><span class="num">'+p+'</span>%</span></div>';}).join('');
  document.getElementById('yTotal').textContent=t;
}
function rtv(){document.getElementById('tagsL').innerHTML=S.tags.map(t=>'<div class="tgi"><div class="tgc" style="background:'+t.c+'"></div><span class="tgn">'+esc(t.n)+'</span><span class="tgc2"><span class="num">'+t.cnt+'</span></span></div>').join('');}
function rrp(){
  const d=S.sel,t=tf(d),dn=t.filter(x=>x.dn).length,tot=t.length,pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('rToday').innerHTML='<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="font-size:13px;color:var(--ink-secondary)">已完成</span><span style="font-size:13px;font-weight:700;color:var(--green)"><span class="num">'+dn+'</span></span></div><div style="display:flex;justify-content:space-between;padding:3px 0"><span style="font-size:13px;color:var(--ink-secondary)">待办</span><span style="font-size:13px;font-weight:700;color:var(--ink-secondary)"><span class="num">'+(tot-dn)+'</span></span></div><div style="display:flex;justify-content:space-between;padding:3px 0;border-top:0.5px solid rgba(0,0,0,0.06);margin-top:2px;padding-top:6px"><span style="font-size:13px;color:var(--ink-secondary)">完成率</span><span style="font-size:13px;font-weight:700;color:var(--accent)"><span class="num">'+pct+'</span>%</span></div>';
  document.getElementById('rStreak').innerHTML='<div style="display:flex;align-items:baseline;gap:3px;margin-bottom:6px"><span style="font-size:28px;font-weight:700;line-height:1;font-family:var(--font-en)"><span class="num">'+S.streak+'</span></span><span style="font-size:11px;color:var(--ink-secondary)">天</span></div><div style="display:flex;gap:2px;margin-bottom:4px">'+[1,0.8,0.6,0.4,0.2,0,0].map((o,i)=>'<div style="flex:1;height:18px;border-radius:2px;background:'+(o>0?'var(--green)':'rgba(0,0,0,0.02)')+';opacity:'+Math.max(o,0.15)+'"></div>').join('')+'</div><div style="font-size:11px;color:var(--ink-secondary)">最长 12 天</div>';
  document.getElementById('rTags').innerHTML='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">'+S.tags.map(t=>'<span style="background:'+t.c+'15;color:'+t.c+';padding:2px 8px;border-radius:7px;font-size:11px;font-weight:500">'+esc(t.n)+'</span>').join('')+'</div>';
}
function ra(){rdt();rt();rs2();rtv();rrp();}
// Focus
function fmt(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function ufd(){const r=S.focus.r;document.getElementById('fTime').innerHTML='<span class="num">'+fmt(r)+'</span>';const total=S.focus.m*60,pct=((total-r)/total)*276;const fg=document.querySelector('.fro .fg');if(fg)fg.style.strokeDashoffset=276-pct;}
// Init
document.addEventListener('DOMContentLoaded',function(){
  bc();ra();ufd();
  document.querySelectorAll('.nav-item').forEach(item=>{item.onclick=function(){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('a'));this.classList.add('a');document.querySelectorAll('.vs').forEach(v=>v.classList.remove('a'));const el=document.getElementById('v-'+this.dataset.v);if(el)el.classList.add('a');};});
  document.getElementById('sbt').onclick=()=>document.getElementById('sidebar').classList.toggle('expanded');
  document.getElementById('cp').onclick=()=>{S.m--;if(S.m<0){S.m=11;S.y--;}S.sel=fd(S.y,S.m,1);bc();ra();};
  document.getElementById('cn').onclick=()=>{S.m++;if(S.m>11){S.m=0;S.y++;}S.sel=fd(S.y,S.m,1);bc();ra();};
  document.getElementById('ct').onclick=()=>{const n=new Date();S.y=n.getFullYear();S.m=n.getMonth();S.sel=fd(n.getFullYear(),n.getMonth(),n.getDate());bc();ra();};
  document.querySelectorAll('.bs').forEach(seg=>{seg.querySelectorAll('button').forEach(btn=>{btn.onclick=function(){seg.querySelectorAll('button').forEach(b=>b.classList.remove('a'));this.classList.add('a');};});});
  document.getElementById('qaf').onsubmit=function(e){e.preventDefault();const inp=document.getElementById('qai'),t=inp.value.trim();if(!t)return;const d=S.sel;if(!S.tasks[d])S.tasks[d]=[];S.tasks[d].push({id:uid(),t,tm:'',p:'medium',dn:false,ss:[]});inp.value='';bc();ra();};
  document.getElementById('tab').onclick=()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('a'));document.querySelector('[data-v="calendar"]').classList.add('a');document.querySelectorAll('.vs').forEach(v=>v.classList.remove('a'));document.getElementById('v-calendar').classList.add('a');const n=new Date();S.y=n.getFullYear();S.m=n.getMonth();S.sel=fd(n.getFullYear(),n.getMonth(),n.getDate());bc();ra();setTimeout(()=>document.getElementById('qai').focus(),100);};
  document.getElementById('fBtn').onclick=function(){
    if(S.focus.run){if(S.focus.int){clearInterval(S.focus.int);S.focus.int=null;}S.focus.run=false;S.focus.r=S.focus.m*60;this.textContent='开始专注';this.className='fbl';document.getElementById('fLabel').textContent='准备就绪';document.querySelectorAll('.fmb').forEach(b=>b.disabled=false);ufd();return;}
    S.focus.run=true;this.textContent='停止';this.classList.add('rn');document.getElementById('fLabel').textContent='专注中...';document.querySelectorAll('.fmb').forEach(b=>b.disabled=true);if(S.focus.int)clearInterval(S.focus.int);
    S.focus.int=setInterval(()=>{S.focus.r--;ufd();if(S.focus.r<=0){clearInterval(S.focus.int);S.focus.int=null;S.focus.run=false;S.fs++;S.ft+=S.focus.m;document.getElementById('fBtn').textContent='完成';document.getElementById('fBtn').className='fbl';document.getElementById('fLabel').textContent='完成！';document.querySelectorAll('.fmb').forEach(b=>b.disabled=false);document.getElementById('fSessions').textContent=S.fs;setTimeout(()=>{if(!S.focus.run)document.getElementById('fBtn').textContent='开始专注';},2000);}},1000);
  };
  document.querySelectorAll('.fmb').forEach(btn=>{btn.onclick=function(){if(S.focus.run)return;document.querySelectorAll('.fmb').forEach(b=>b.classList.remove('a'));this.classList.add('a');S.focus.m=+this.dataset.m;S.focus.r=S.focus.m*60;ufd();};});
  document.getElementById('addTag').onclick=()=>{const n=prompt('标签名称：');if(!n)return;const cs=['#ff3b30','#007aff','#34c759','#ff9500','#5856d6'];S.tags.push({n,c:cs[S.tags.length%cs.length],cnt:0});rtv();rrp();};
  // Theme
  const tt2=document.getElementById('tToggle');
  tt2.onclick=function(){this.classList.toggle('dark');document.documentElement.classList.toggle('dark');this.querySelector('span').textContent=this.classList.contains('dark')?'浅色':'深色';document.getElementById('sTheme').classList.toggle('on');};
  document.getElementById('sTheme').onclick=function(){this.classList.toggle('on');tt2.classList.toggle('dark');document.documentElement.classList.toggle('dark');tt2.querySelector('span').textContent=tt2.classList.contains('dark')?'浅色':'深色';};
  // Right panel
  document.getElementById('rToggle').onclick=function(e){e.stopPropagation();document.getElementById('sr2').classList.toggle('collapsed');};
  document.getElementById('sr2').onclick=function(e){if(this.classList.contains('collapsed')){const r=this.getBoundingClientRect();if(e.clientX>=r.right-20)this.classList.remove('collapsed');}};
  // Resize handle
  const rh=document.getElementById('rh'),sr=document.getElementById('sr2');let drg=false,sx=0,sw=0;
  rh.onmousedown=function(e){sx=e.clientX;sw=sr.offsetWidth;sr.classList.remove('collapsed');drg=false;this.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';};
  document.onmousemove=function(e){if(!rh.classList.contains('active'))return;const dx=e.clientX-sx;if(Math.abs(dx)>3)drg=true;sr.style.width=Math.max(180,Math.min(400,sw-dx))+'px';sr.style.flex='none';};
  document.onmouseup=function(){if(rh.classList.contains('active')){rh.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';}};
  rh.onclick=function(){if(!drg)sr.classList.toggle('collapsed');};
  // Heatmap
  const hm=document.getElementById('hm');
  if(hm){for(let w=0;w<53;w++){const col=document.createElement('div');col.style.cssText='display:flex;gap:1.5px;flex-direction:column';for(let d=0;d<7;d++){const r=Math.random(),lv=r<0.3?0:r<0.5?1:r<0.7?2:r<0.85?3:4;const cell=document.createElement('div');cell.className='hmc l'+lv;cell.style.cssText='width:8px;height:8px';col.appendChild(cell);}hm.appendChild(col);}}
  
});
</script>
</body>
</html>
